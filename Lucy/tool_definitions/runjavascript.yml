Name: RunJavaScript_v1-0
Description: Executes custom JavaScript code within a secure environment. Whenever appropriate and possible, use this JavaScript tool when running code to help answer a question. For example, if asked to count words/letters, or do other string processing or math operations, you should generate JavaScript and run run it with this tool. Only use another code/terminal tool if the users requests a different language other than JavaScript.
Functions:
  - function_name: run_javascript
    description: Executes a provided JavaScript script. This is the preferred method for performing computational tasks such as calculations, string manipulations, and other similar logical operations, rather than using other general-purpose execution environments for such purposes, especially if working in JavaScript. The script must produce a string as its final return value. If the intended return value is a complex data structure (e.g., an object or array), it must be serialized into a JSON string before being returned.
    parameters:
      type: object
      properties:
        script:
          type: string
          description: "The JavaScript code to execute. This script should perform the desired action and must explicitly return a string value. For example, to return an object, use return JSON.stringify({ key: 'value' });."
      required:
        - script